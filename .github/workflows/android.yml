name: Android CI

on:
workflow_dispatch:
pull_request:
branches:
- master

permissions:
contents: read

jobs:
validate:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Setup JDK 21
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "21"
      cache: gradle

  - name: Setup Gradle
    uses: gradle/actions/setup-gradle@v4

  - name: Grant execute permission
    run: chmod +x gradlew

  - name: Verify project compiles
    run: ./gradlew assembleMiniDebug --stacktrace
```
